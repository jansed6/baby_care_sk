<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>BabyCare SK</title>

  <style>
    :root {
      --bg-1: #eaf5ee;
      --bg-2: #f7fbf8;
      --text: #1f2937;
      --muted: #6b7280;
      --primary: #34c759;
      --primary-dark: #27ae4a;
      --card: rgba(255, 255, 255, 0.86);
      --border: rgba(255, 255, 255, 0.8);
      --shadow: 0 14px 34px rgba(21, 36, 25, 0.09);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at 15% 20%, #dff4e5 0%, transparent 35%),
                  radial-gradient(circle at 85% 0%, #e8f2ff 0%, transparent 30%),
                  linear-gradient(180deg, var(--bg-1) 0%, var(--bg-2) 100%);
      min-height: 100vh;
    }

    .container {
      max-width: 1140px;
      margin: auto;
      padding: 42px 20px 56px;
      text-align: center;
    }

    .hero {
      background: linear-gradient(160deg, rgba(255,255,255,0.9), rgba(255,255,255,0.72));
      border: 1px solid var(--border);
      border-radius: 30px;
      box-shadow: var(--shadow);
      padding: 48px 24px;
      backdrop-filter: blur(6px);
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 16px;
      padding: 8px 14px;
      border-radius: 999px;
      font-size: 13px;
      font-weight: 600;
      color: #1d6e34;
      background: rgba(52, 199, 89, 0.16);
    }

    .logo {
      width: 112px;
      border-radius: 28px;
      margin-bottom: 16px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.15);
    }

    h1 {
      font-size: clamp(38px, 6vw, 64px);
      line-height: 1.05;
      margin: 0;
      letter-spacing: -0.02em;
    }

    h1 span {
      color: var(--primary);
    }

    .subtitle {
      font-size: clamp(17px, 2.3vw, 21px);
      color: var(--muted);
      margin: 16px auto 0;
      max-width: 680px;
      line-height: 1.55;
    }

    .cta {
      margin-top: 28px;
      display: flex;
      justify-content: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .button {
      display: inline-block;
      padding: 15px 30px;
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: white;
      border-radius: 999px;
      text-decoration: none;
      font-weight: 700;
      letter-spacing: 0.01em;
      box-shadow: 0 12px 24px rgba(52, 199, 89, 0.28);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .button:hover {
      transform: translateY(-2px);
      box-shadow: 0 16px 28px rgba(52, 199, 89, 0.36);
    }

    .section-title {
      margin: 70px 0 24px;
      font-size: clamp(28px, 4vw, 36px);
      letter-spacing: -0.01em;
    }

    .features {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 16px;
      text-align: left;
    }

    .card {
      background: var(--card);
      border: 1px solid var(--border);
      padding: 20px 18px;
      border-radius: 18px;
      box-shadow: 0 10px 22px rgba(0, 0, 0, 0.06);
      font-size: 17px;
      font-weight: 600;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .card:hover {
      transform: translateY(-3px);
      box-shadow: 0 16px 26px rgba(0, 0, 0, 0.08);
    }

    .screens {
      margin-top: 6px;
    }

    .screen-grid {
      display: flex;
      justify-content: center;
      gap: 20px;
      flex-wrap: wrap;
    }

    .screen-grid img {
      width: 220px;
      border-radius: 32px;
      border: 1px solid rgba(255, 255, 255, 0.75);
      box-shadow: 0 14px 36px rgba(0, 0, 0, 0.18);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
    }

    .screen-grid img:hover {
      transform: translateY(-6px) scale(1.02);
      box-shadow: 0 20px 40px rgba(0, 0, 0, 0.22);
    }

    footer {
      margin-top: 70px;
      padding: 10px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .container {
        padding-top: 26px;
      }

      .hero {
        padding: 34px 18px;
        border-radius: 22px;
      }

      .logo {
        width: 94px;
      }

      .screen-grid img {
        width: min(250px, 72vw);
      }

      .card {
        text-align: center;
      }
    }
  </style>
</head>

<body>

  <div class="container">

    <!-- HERO -->
    <section class="hero">
      <div class="badge">iOS štýl • Slovenská appka</div>
      <img src="BabyCareSkLogo.png" class="logo" alt="BabyCare SK Logo"/>

      <h1>BabyCare <span>SK</span></h1>

      <p class="subtitle">
        Jednoduchá aplikácia na sledovanie denných aktivít bábätka - kŕmenie, spánok, plienky a viac.
      </p>

      <div class="cta">
        <a href="https://apps.apple.com/" class="button">
          Stiahnuť na App Store
        </a>
      </div>
    </section>

    <h2 class="section-title">Čo aplikácia ponúka</h2>
    <div class="features">
      <div class="card">🤱 Dojčenie</div>
      <div class="card">😴 Spánok</div>
      <div class="card">🍼 Fľaša</div>
      <div class="card">👶 Plienky</div>
      <div class="card">💊 Vitamín D</div>
      <div class="card">🌙 Tmavý režim</div>
    </div>

    <!-- SCREENSHOTS -->
    <div class="screens">
      <h2 class="section-title">Ukážka aplikácie</h2>

      <div class="screen-grid">
        <img src="screenshots/HomeScreen.png" alt="Home screen aplikácie">
        <img src="screenshots/HomeScreenDark.png" alt="Dark mode home screen">
        <img src="screenshots/StatisticsScreen.png" alt="Statistics screen aplikácie">
        <img src="screenshots/SettingsScreen.png" alt="Settings screen aplikácie">
      </div>
    </div>

    <!-- FOOTER -->
    <footer>
      © 2026 BabyCareSK • Eduard Janský
    </footer>

  </div>

</body>
</html>
